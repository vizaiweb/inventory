<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>掃碼記貨品 - 庫存管理</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }

        .scanner-section {
            background: #000;
            position: relative;
            padding: 20px 0;
        }

        #reader {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            background: #000;
        }

        .scanner-controls {
            text-align: center;
            padding: 12px;
        }

        .btn-scanner {
            background: #007aff;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-scanner:active {
            transform: scale(0.96);
        }

        .content {
            padding: 16px;
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .card-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #333;
            border-left: 4px solid #007aff;
            padding-left: 12px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            margin-bottom: 6px;
        }

        .form-group input, 
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
        }

        .form-group input:focus, 
        .form-group textarea:focus {
            outline: none;
            border-color: #007aff;
        }

        .form-group input[readonly] {
            background: #f8f9fa;
            color: #666;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-primary {
            background: #007aff;
            color: white;
        }

        .btn-secondary {
            background: #8e8e93;
            color: white;
        }

        .btn-danger {
            background: #ff3b30;
            color: white;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .btn-group button {
            flex: 1;
        }

        .product-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-info {
            flex: 1;
            cursor: pointer;
        }

        .product-name {
            font-weight: 600;
            font-size: 16px;
            color: #333;
            margin-bottom: 4px;
        }

        .product-barcode {
            font-size: 12px;
            color: #666;
            font-family: monospace;
        }

        .product-meta {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 1000;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .tabs {
            display: flex;
            background: white;
            border-bottom: 1px solid #e5e5e5;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 14px;
            cursor: pointer;
            font-weight: 500;
            color: #666;
        }

        .tab.active {
            color: #007aff;
            border-bottom: 2px solid #007aff;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .search-box {
            margin-bottom: 16px;
        }

        .search-box input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .scan-hint {
            text-align: center;
            padding: 20px;
            color: #999;
        }

        .stats-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 16px;
            text-align: center;
        }

        .stats-number {
            font-size: 32px;
            font-weight: bold;
        }

        .stats-label {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 4px;
        }

        .scan-result {
            background: #e8f0fe;
            border-left: 4px solid #007aff;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .scan-result-code {
            font-family: monospace;
            font-size: 14px;
            word-break: break-all;
        }
    </style>
</head>
<body>

<div class="tabs">
    <div class="tab active" data-tab="scan">📷 掃描</div>
    <div class="tab" data-tab="list">📋 貨品清單</div>
    <div class="tab" data-tab="settings">⚙️ 設定</div>
</div>

<!-- 掃描頁 -->
<div class="tab-content active" id="tab-scan">
    <div class="scanner-section">
        <div id="reader"></div>
        <div class="scanner-controls">
            <button class="btn-scanner" id="startScannerBtn">▶ 啟動掃描器</button>
            <button class="btn-scanner" id="stopScannerBtn" style="display:none;">⏸ 停止掃描</button>
        </div>
    </div>
    
    <div class="content">
        <!-- 顯示最後掃描的條碼 -->
        <div id="lastScanDisplay" style="display:none;" class="scan-result">
            <div style="font-weight:500; margin-bottom:4px;">📷 最後掃描的條碼：</div>
            <div class="scan-result-code" id="lastScannedCode"></div>
        </div>

        <!-- 貨品編輯表單 -->
        <div class="card" id="productFormCard" style="display:none;">
            <div class="card-title" id="formTitle">➕ 新增貨品</div>
            <form id="productForm">
                <div class="form-group">
                    <label>📷 條碼 / QR Code</label>
                    <input type="text" id="barcode" readonly placeholder="掃描後自動顯示">
                </div>
                <div class="form-group">
                    <label>🏷️ 貨品名稱 *</label>
                    <input type="text" id="name" required placeholder="例：可口可樂 330ml">
                </div>
                <div class="form-group">
                    <label>💰 價格 (NT$)</label>
                    <input type="number" id="price" step="1" placeholder="0">
                </div>
                <div class="form-group">
                    <label>📦 數量</label>
                    <input type="number" id="quantity" value="1" placeholder="數量">
                </div>
                <div class="form-group">
                    <label>📝 備註</label>
                    <textarea id="remark" rows="2" placeholder="產地、規格等"></textarea>
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary" id="saveBtn">💾 儲存</button>
                    <button type="button" class="btn btn-secondary" id="cancelBtn">取消</button>
                    <button type="button" class="btn btn-danger" id="deleteBtn" style="display:none;">🗑 刪除</button>
                </div>
            </form>
        </div>
        
        <!-- 掃描提示 -->
        <div class="card" id="scanHint">
            <div class="scan-hint">
                <div style="font-size: 48px; margin-bottom: 12px;">📱</div>
                <div style="font-weight: 500; margin-bottom: 8px;">點擊「啟動掃描器」</div>
                <div style="font-size: 14px; color: #999;">將鏡頭對準條碼或 QR Code</div>
            </div>
        </div>
    </div>
</div>

<!-- 貨品清單頁 -->
<div class="tab-content" id="tab-list">
    <div class="content">
        <div class="stats-card">
            <div class="stats-number" id="totalCount">0</div>
            <div class="stats-label">總貨品數</div>
            <div class="stats-number" id="totalValue" style="font-size: 20px; margin-top: 8px;">$0</div>
            <div class="stats-label">庫存總價值</div>
        </div>
        
        <div class="card">
            <div class="card-title">📋 所有貨品</div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 搜尋貨品名稱或條碼...">
            </div>
            <div id="productList"></div>
        </div>
    </div>
</div>

<!-- 設定頁 -->
<div class="tab-content" id="tab-settings">
    <div class="content">
        <div class="card">
            <div class="card-title">💾 資料管理</div>
            <div style="display: flex; flex-direction: column; gap: 12px;">
                <button class="btn btn-primary" id="exportBtn">📤 匯出 JSON 備份</button>
                <label class="btn btn-secondary" style="text-align:center; cursor:pointer; background:#8e8e93;">
                    📥 匯入 JSON 檔案
                    <input type="file" id="importFile" accept=".json" style="display:none;">
                </label>
                <button class="btn btn-danger" id="clearAllBtn">⚠️ 清除所有資料</button>
            </div>
        </div>
        
        <div class="card">
            <div class="card-title">ℹ️ 使用說明</div>
            <div style="font-size: 14px; line-height: 1.8; color: #666;">
                <p>📌 <strong>掃描流程</strong><br>
                1. 點擊「啟動掃描器」並允許鏡頭權限<br>
                2. 將鏡頭對準條碼/QR Code<br>
                3. 系統會自動查詢資料庫：<br>
                &nbsp;&nbsp;• <span style="color:#34c759;">✅ 有相同條碼</span> → 開啟該貨品資料（可編輯）<br>
                &nbsp;&nbsp;• <span style="color:#007aff;">🆕 無相同條碼</span> → 開啟新增表單（條碼已自動填入）<br>
                4. 填寫貨品資訊後點擊「儲存」</p>
                
                <p>📌 <strong>編輯貨品</strong><br>
                在「貨品清單」點擊貨品即可編輯</p>
                
                <p>📌 <strong>資料備份</strong><br>
                可匯出 JSON 檔案備份，或匯入還原資料</p>
            </div>
        </div>
    </div>
</div>

<script>
    // 初始化 IndexedDB
    const db = new Dexie('InventoryDB');
    db.version(1).stores({
        products: '++id, barcode, name, price, quantity, remark, createdAt, updatedAt'
    });

    let html5QrCodeScanner = null;
    let currentProduct = null;
    let isScannerRunning = false;

    function showToast(message) {
        const existingToast = document.querySelector('.toast');
        if (existingToast) existingToast.remove();
        
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    // 根據條碼查詢貨品
    async function getProductByBarcode(barcode) {
        return await db.products.where('barcode').equals(barcode).first();
    }

    // 新增貨品
    async function addProduct(product) {
        const now = new Date().toISOString();
        await db.products.add({
            ...product,
            createdAt: now,
            updatedAt: now
        });
        showToast('✅ 新增成功');
    }

    // 更新貨品
    async function updateProduct(id, updates) {
        await db.products.update(id, {
            ...updates,
            updatedAt: new Date().toISOString()
        });
        showToast('✏️ 更新成功');
    }

    // 刪除貨品
    async function deleteProduct(id) {
        if (confirm('確定要刪除這個貨品嗎？')) {
            await db.products.delete(id);
            showToast('🗑 刪除成功');
            resetForm();
            loadProductList();
            updateStats();
        }
    }

    // 顯示貨品編輯表單
    function showProductForm(product, barcode) {
        const formCard = document.getElementById('productFormCard');
        const formTitle = document.getElementById('formTitle');
        const deleteBtn = document.getElementById('deleteBtn');
        const lastScanDiv = document.getElementById('lastScanDisplay');
        
        // 顯示最後掃描的條碼
        lastScanDiv.style.display = 'block';
        document.getElementById('lastScannedCode').textContent = barcode;
        
        if (product) {
            // 有相同條碼 → 編輯模式，載入已儲存的資料
            formTitle.textContent = '✏️ 編輯貨品（已存在）';
            document.getElementById('barcode').value = product.barcode;
            document.getElementById('name').value = product.name || '';
            document.getElementById('price').value = product.price || '';
            document.getElementById('quantity').value = product.quantity || 0;
            document.getElementById('remark').value = product.remark || '';
            deleteBtn.style.display = 'block';
            currentProduct = product;
        } else {
            // 無相同條碼 → 新增模式，條碼已自動填入
            formTitle.textContent = '➕ 新增貨品（新條碼）';
            document.getElementById('barcode').value = barcode;
            document.getElementById('name').value = '';
            document.getElementById('price').value = '';
            document.getElementById('quantity').value = 1;
            document.getElementById('remark').value = '';
            deleteBtn.style.display = 'none';
            currentProduct = null;
        }
        
        formCard.style.display = 'block';
        document.getElementById('scanHint').style.display = 'none';
        setTimeout(() => document.getElementById('name').focus(), 100);
    }

    function resetForm() {
        document.getElementById('productFormCard').style.display = 'none';
        document.getElementById('scanHint').style.display = 'block';
        document.getElementById('lastScanDisplay').style.display = 'none';
        currentProduct = null;
    }

    // 儲存表單
    async function handleSave() {
        const name = document.getElementById('name').value.trim();
        if (!name) {
            showToast('請輸入貨品名稱');
            document.getElementById('name').focus();
            return;
        }
        
        const productData = {
            barcode: document.getElementById('barcode').value,
            name: name,
            price: parseFloat(document.getElementById('price').value) || 0,
            quantity: parseInt(document.getElementById('quantity').value) || 0,
            remark: document.getElementById('remark').value
        };
        
        if (currentProduct) {
            // 更新已存在的貨品
            await updateProduct(currentProduct.id, productData);
            loadProductList();
            resetForm();
        } else {
            // 新增貨品（條碼已經在掃描時寫入）
            await addProduct(productData);
            loadProductList();
            resetForm();
        }
        updateStats();
    }

    // ⭐ 核心功能：掃描條碼後的處理
    async function onScanSuccess(decodedText) {
        if (!isScannerRunning) return;
        
        console.log('📷 掃描到條碼:', decodedText);
        
        // 震動回饋
        if (navigator.vibrate) navigator.vibrate(100);
        
        // 🔍 步驟1：記錄該 code 的 number
        const scannedCode = decodedText;
        
        // 🔍 步驟2：查詢資料庫是否有相同條碼
        const existingProduct = await getProductByBarcode(scannedCode);
        
        // 🔍 步驟3：比對結果
        if (existingProduct) {
            // ✅ 有相同條碼 → 打開該貨品已儲存的資料
            showToast(`📦 找到貨品: ${existingProduct.name}`);
            showProductForm(existingProduct, scannedCode);
        } else {
            // ✅ 沒有相同條碼 → 新增貨品，並自動寫入該條碼
            showToast(`🆕 新條碼，請填寫貨品資訊`);
            showProductForm(null, scannedCode);
        }
    }

    // 掃描器控制
    function startScanner() {
        if (!html5QrCodeScanner) {
            initScanner();
        }
    }
    
    function initScanner() {
        html5QrCodeScanner = new Html5Qrcode("reader");
        const config = {
            fps: 10,
            qrbox: { width: 280, height: 280 },
            aspectRatio: 1.0
        };
        
        html5QrCodeScanner.start(
            { facingMode: "environment" },
            config,
            onScanSuccess,
            (error) => {}
        ).then(() => {
            isScannerRunning = true;
            document.getElementById('startScannerBtn').style.display = 'none';
            document.getElementById('stopScannerBtn').style.display = 'inline-block';
            showToast('📷 掃描器已啟動');
        }).catch(err => {
            console.error('啟動掃描器失敗:', err);
            showToast('無法啟動掃描器，請確認已允許鏡頭權限');
        });
    }
    
    function stopScanner() {
        if (html5QrCodeScanner && isScannerRunning) {
            html5QrCodeScanner.stop().then(() => {
                isScannerRunning = false;
                document.getElementById('startScannerBtn').style.display = 'inline-block';
                document.getElementById('stopScannerBtn').style.display = 'none';
                showToast('掃描器已停止');
            });
        }
    }

    // 貨品列表相關函數
    async function getAllProducts() {
        return await db.products.toArray();
    }

    async function searchProducts(keyword) {
        if (!keyword) return await getAllProducts();
        const products = await db.products.toArray();
        return products.filter(p => 
            (p.name && p.name.toLowerCase().includes(keyword.toLowerCase())) || 
            (p.barcode && p.barcode.toLowerCase().includes(keyword.toLowerCase()))
        );
    }

    async function loadProductList() {
        const searchKeyword = document.getElementById('searchInput')?.value || '';
        const products = await searchProducts(searchKeyword);
        const container = document.getElementById('productList');
        
        if (products.length === 0) {
            container.innerHTML = `<div class="empty-state">📭 暫無貨品資料</div>`;
            return;
        }
        
        container.innerHTML = products.map(p => `
            <div class="product-item">
                <div class="product-info" onclick="editProductById(${p.id})">
                    <div class="product-name">${escapeHtml(p.name || '無名稱')}</div>
                    <div class="product-barcode">📷 ${escapeHtml(p.barcode || '無條碼')}</div>
                    <div class="product-meta">💰 $${(p.price || 0).toLocaleString()} &nbsp;|&nbsp; 📦 ${p.quantity || 0} 件</div>
                </div>
                <div class="product-actions">
                    <button class="icon-btn" onclick="editProductById(${p.id})">✏️</button>
                    <button class="icon-btn" onclick="deleteProductById(${p.id})">🗑️</button>
                </div>
            </div>
        `).join('');
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    window.editProductById = async function(id) {
        const product = await db.products.get(id);
        if (product) {
            switchTab('scan');
            showProductForm(product, product.barcode);
        }
    };
    
    window.deleteProductById = async function(id) {
        if (confirm('確定刪除此貨品？')) {
            await db.products.delete(id);
            showToast('已刪除');
            loadProductList();
            updateStats();
            resetForm();
        }
    };
    
    async function updateStats() {
        const count = await db.products.count();
        const products = await db.products.toArray();
        const totalValue = products.reduce((sum, p) => sum + (p.price || 0) * (p.quantity || 0), 0);
        document.getElementById('totalCount').textContent = count;
        document.getElementById('totalValue').textContent = `$${totalValue.toLocaleString()}`;
    }

    // 匯出/匯入
    async function exportData() {
        const products = await getAllProducts();
        if (products.length === 0) {
            showToast('沒有資料可匯出');
            return;
        }
        const blob = new Blob([JSON.stringify(products, null, 2)], { type: 'application/json' });
        saveAs(blob, `inventory_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`);
        showToast(`匯出 ${products.length} 筆資料`);
    }
    
    async function importData(file) {
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const products = JSON.parse(e.target.result);
                if (!confirm(`匯入將覆蓋現有 ${await db.products.count()} 筆資料，確定繼續？`)) return;
                await db.products.clear();
                const cleanProducts = products.map(({ id, ...rest }) => rest);
                await db.products.bulkAdd(cleanProducts);
                showToast(`成功匯入 ${cleanProducts.length} 筆資料`);
                loadProductList();
                updateStats();
            } catch (err) {
                showToast('檔案格式錯誤');
            }
        };
        reader.readAsText(file);
    }
    
    async function clearAllData() {
        if (confirm('⚠️ 確定清除所有資料？')) {
            await db.products.clear();
            showToast('已清除所有資料');
            loadProductList();
            updateStats();
            resetForm();
        }
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(`tab-${tabId}`).classList.add('active');
        document.querySelector(`.tab[data-tab="${tabId}"]`).classList.add('active');
        if (tabId === 'list') { loadProductList(); updateStats(); }
        if (tabId === 'settings') { updateStats(); }
    }

    // 事件綁定
    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => switchTab(tab.getAttribute('data-tab')));
        });
        
        document.getElementById('startScannerBtn').addEventListener('click', startScanner);
        document.getElementById('stopScannerBtn').addEventListener('click', stopScanner);
        document.getElementById('productForm').addEventListener('submit', (e) => { e.preventDefault(); handleSave(); });
        document.getElementById('cancelBtn').addEventListener('click', resetForm);
        document.getElementById('deleteBtn').addEventListener('click', async () => { if (currentProduct) await deleteProduct(currentProduct.id); });
        document.getElementById('exportBtn').addEventListener('click', exportData);
        document.getElementById('importFile').addEventListener('change', (e) => { if (e.target.files[0]) importData(e.target.files[0]); e.target.value = ''; });
        document.getElementById('clearAllBtn').addEventListener('click', clearAllData);
        document.getElementById('searchInput').addEventListener('input', () => loadProductList());
        
        updateStats();
        showToast('歡迎使用！點擊「啟動掃描器」開始');
    });
</script>
</body>
</html>
