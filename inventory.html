<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>掃碼記貨品 - 庫存管理</title>
    <!-- 引入 html5-qrcode 掃描庫 -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <!-- 引入 Dexie.js (IndexedDB 封裝) -->
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>
    <!-- 引入 FileSaver.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }

        /* 掃描器區塊 */
        .scanner-section {
            background: #000;
            position: relative;
            padding: 20px 0;
        }

        #reader {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            background: #000;
        }

        .scanner-controls {
            text-align: center;
            padding: 12px;
        }

        .btn-scanner {
            background: #007aff;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-scanner:active {
            transform: scale(0.96);
        }

        /* 主要內容區 */
        .content {
            padding: 16px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* 卡片樣式 */
        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .card-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #333;
            border-left: 4px solid #007aff;
            padding-left: 12px;
        }

        /* 表單 */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            margin-bottom: 6px;
        }

        .form-group input, 
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .form-group input:focus, 
        .form-group textarea:focus {
            outline: none;
            border-color: #007aff;
        }

        .form-group input[readonly] {
            background: #f8f9fa;
            color: #666;
        }

        /* 按鈕 */
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: #007aff;
            color: white;
        }

        .btn-success {
            background: #34c759;
            color: white;
        }

        .btn-danger {
            background: #ff3b30;
            color: white;
        }

        .btn-secondary {
            background: #8e8e93;
            color: white;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .btn-group button {
            flex: 1;
        }

        /* 貨品列表 */
        .product-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }

        .product-item:active {
            background: #e9ecef;
        }

        .product-info {
            flex: 1;
            cursor: pointer;
        }

        .product-name {
            font-weight: 600;
            font-size: 16px;
            color: #333;
            margin-bottom: 4px;
        }

        .product-barcode {
            font-size: 12px;
            color: #666;
            font-family: monospace;
            margin-bottom: 4px;
        }

        .product-meta {
            font-size: 12px;
            color: #999;
        }

        .product-actions {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            transition: transform 0.1s;
        }

        .icon-btn:active {
            transform: scale(0.9);
        }

        /* 提示訊息 */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 1000;
            white-space: nowrap;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* 標籤頁 */
        .tabs {
            display: flex;
            background: white;
            border-bottom: 1px solid #e5e5e5;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 14px;
            cursor: pointer;
            font-weight: 500;
            color: #666;
            transition: all 0.2s;
            font-size: 15px;
        }

        .tab.active {
            color: #007aff;
            border-bottom: 2px solid #007aff;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* 搜尋框 */
        .search-box {
            margin-bottom: 16px;
        }

        .search-box input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            background: #f8f9fa;
        }

        /* 空狀態 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        /* 掃描提示 */
        .scan-hint {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 14px;
        }

        /* 統計卡片 */
        .stats-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 16px;
            text-align: center;
        }

        .stats-number {
            font-size: 32px;
            font-weight: bold;
        }

        .stats-label {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<!-- 標籤頁導航 -->
<div class="tabs">
    <div class="tab active" data-tab="scan">📷 掃描</div>
    <div class="tab" data-tab="list">📋 貨品清單</div>
    <div class="tab" data-tab="settings">⚙️ 設定</div>
</div>

<!-- 掃描頁 -->
<div class="tab-content active" id="tab-scan">
    <div class="scanner-section">
        <div id="reader"></div>
        <div class="scanner-controls">
            <button class="btn-scanner" id="startScannerBtn">▶ 啟動掃描器</button>
            <button class="btn-scanner" id="stopScannerBtn" style="display:none;">⏸ 停止掃描</button>
        </div>
    </div>
    
    <div class="content">
        <!-- 貨品編輯表單 -->
        <div class="card" id="productFormCard" style="display:none;">
            <div class="card-title" id="formTitle">➕ 新增貨品</div>
            <form id="productForm">
                <div class="form-group">
                    <label>📷 條碼 / QR Code</label>
                    <input type="text" id="barcode" readonly placeholder="掃描後自動顯示">
                </div>
                <div class="form-group">
                    <label>🏷️ 貨品名稱 *</label>
                    <input type="text" id="name" required placeholder="例：可口可樂 330ml">
                </div>
                <div class="form-group">
                    <label>💰 價格 (NT$)</label>
                    <input type="number" id="price" step="1" placeholder="0">
                </div>
                <div class="form-group">
                    <label>📦 數量</label>
                    <input type="number" id="quantity" value="1" placeholder="數量">
                </div>
                <div class="form-group">
                    <label>📝 備註</label>
                    <textarea id="remark" rows="2" placeholder="產地、規格等"></textarea>
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary" id="saveBtn">💾 儲存</button>
                    <button type="button" class="btn btn-secondary" id="cancelBtn">取消</button>
                    <button type="button" class="btn btn-danger" id="deleteBtn" style="display:none;">🗑 刪除</button>
                </div>
            </form>
        </div>
        
        <!-- 掃描提示 -->
        <div class="card" id="scanHint">
            <div class="scan-hint">
                <div style="font-size: 48px; margin-bottom: 12px;">📱</div>
                <div style="font-weight: 500; margin-bottom: 8px;">點擊「啟動掃描器」</div>
                <div style="font-size: 14px; color: #999;">將鏡頭對準條碼或 QR Code</div>
            </div>
        </div>
    </div>
</div>

<!-- 貨品清單頁 -->
<div class="tab-content" id="tab-list">
    <div class="content">
        <!-- 統計卡片 -->
        <div class="stats-card" id="statsCard">
            <div class="stats-number" id="totalCount">0</div>
            <div class="stats-label">總貨品數</div>
            <div class="stats-number" id="totalValue" style="font-size: 20px; margin-top: 8px;">$0</div>
            <div class="stats-label">庫存總價值</div>
        </div>
        
        <div class="card">
            <div class="card-title">📋 所有貨品</div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 搜尋貨品名稱或條碼...">
            </div>
            <div id="productList"></div>
        </div>
    </div>
</div>

<!-- 設定頁 -->
<div class="tab-content" id="tab-settings">
    <div class="content">
        <div class="card">
            <div class="card-title">💾 資料管理</div>
            <div style="display: flex; flex-direction: column; gap: 12px;">
                <button class="btn btn-primary" id="exportBtn">📤 匯出 JSON 備份</button>
                <label class="btn btn-secondary" style="text-align:center; cursor:pointer; background:#8e8e93;">
                    📥 匯入 JSON 檔案
                    <input type="file" id="importFile" accept=".json" style="display:none;">
                </label>
                <button class="btn btn-danger" id="clearAllBtn">⚠️ 清除所有資料</button>
            </div>
        </div>
        
        <div class="card">
            <div class="card-title">ℹ️ 使用說明</div>
            <div style="font-size: 14px; line-height: 1.8; color: #666;">
                <p>📌 <strong>掃描貨品</strong><br>
                1. 點擊「啟動掃描器」並允許鏡頭權限<br>
                2. 將鏡頭對準條碼/QR Code<br>
                3. 自動辨識後填寫貨品資訊儲存</p>
                
                <p>📌 <strong>編輯貨品</strong><br>
                在「貨品清單」點擊貨品即可編輯</p>
                
                <p>📌 <strong>資料備份</strong><br>
                可匯出 JSON 檔案備份，或匯入還原資料</p>
                
                <p style="margin-top: 12px; background: #f0f0f0; padding: 8px; border-radius: 8px;">
                💡 所有資料儲存在手機瀏覽器中，清除瀏覽器資料會遺失，請定期備份。
                </p>
            </div>
        </div>
    </div>
</div>

<script>
    // ==================== 初始化 IndexedDB ====================
    const db = new Dexie('InventoryDB');
    db.version(1).stores({
        products: '++id, barcode, name, price, quantity, remark, createdAt, updatedAt'
    });

    // 全域變數
    let html5QrCodeScanner = null;
    let currentProduct = null;
    let currentBarcode = null;
    let isScannerRunning = false;

    // ==================== 工具函數 ====================
    function showToast(message, duration = 2000) {
        const existingToast = document.querySelector('.toast');
        if (existingToast) existingToast.remove();
        
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), duration);
    }

    // ==================== 貨品 CRUD ====================
    async function addProduct(product) {
        const now = new Date().toISOString();
        const id = await db.products.add({
            ...product,
            createdAt: now,
            updatedAt: now
        });
        showToast('✅ 新增成功');
        return id;
    }

    async function updateProduct(id, updates) {
        await db.products.update(id, {
            ...updates,
            updatedAt: new Date().toISOString()
        });
        showToast('✏️ 更新成功');
    }

    async function deleteProduct(id) {
        if (confirm('確定要刪除這個貨品嗎？')) {
            await db.products.delete(id);
            showToast('🗑 刪除成功');
            resetForm();
            loadProductList();
            updateStats();
        }
    }

    async function getProductByBarcode(barcode) {
        return await db.products.where('barcode').equals(barcode).first();
    }

    async function getAllProducts() {
        return await db.products.toArray();
    }

    async function searchProducts(keyword) {
        if (!keyword) return await getAllProducts();
        const products = await db.products.toArray();
        return products.filter(p => 
            (p.name && p.name.toLowerCase().includes(keyword.toLowerCase())) || 
            (p.barcode && p.barcode.toLowerCase().includes(keyword.toLowerCase()))
        );
    }

    async function clearAllData() {
        const count = await db.products.count();
        if (count === 0) {
            showToast('沒有資料需要清除');
            return;
        }
        if (confirm(`⚠️ 確定要清除所有 ${count} 筆貨品資料嗎？此操作無法復原！`)) {
            await db.products.clear();
            showToast('已清除所有資料');
            loadProductList();
            updateStats();
            resetForm();
        }
    }

    // 顯示貨品編輯表單
    function showProductForm(product, barcode) {
        const formCard = document.getElementById('productFormCard');
        const formTitle = document.getElementById('formTitle');
        const deleteBtn = document.getElementById('deleteBtn');
        
        if (product) {
            formTitle.textContent = '✏️ 編輯貨品';
            document.getElementById('barcode').value = product.barcode || '';
            document.getElementById('name').value = product.name || '';
            document.getElementById('price').value = product.price || '';
            document.getElementById('quantity').value = product.quantity || 0;
            document.getElementById('remark').value = product.remark || '';
            deleteBtn.style.display = 'block';
            currentProduct = product;
            currentBarcode = product.barcode;
        } else {
            formTitle.textContent = '➕ 新增貨品';
            document.getElementById('barcode').value = barcode || '';
            document.getElementById('name').value = '';
            document.getElementById('price').value = '';
            document.getElementById('quantity').value = 1;
            document.getElementById('remark').value = '';
            deleteBtn.style.display = 'none';
            currentProduct = null;
            currentBarcode = barcode;
        }
        
        formCard.style.display = 'block';
        document.getElementById('scanHint').style.display = 'none';
        
        // 自動聚焦到名稱欄位
        setTimeout(() => document.getElementById('name').focus(), 100);
    }

    function resetForm() {
        document.getElementById('productFormCard').style.display = 'none';
        document.getElementById('scanHint').style.display = 'block';
        currentProduct = null;
        currentBarcode = null;
    }

    // 儲存表單
    async function handleSave() {
        const name = document.getElementById('name').value.trim();
        if (!name) {
            showToast('請輸入貨品名稱');
            document.getElementById('name').focus();
            return;
        }
        
        const productData = {
            barcode: document.getElementById('barcode').value,
            name: name,
            price: parseFloat(document.getElementById('price').value) || 0,
            quantity: parseInt(document.getElementById('quantity').value) || 0,
            remark: document.getElementById('remark').value
        };
        
        if (currentProduct) {
            await updateProduct(currentProduct.id, productData);
            loadProductList();
            resetForm();
        } else {
            // 檢查是否已存在相同條碼
            const existing = await getProductByBarcode(productData.barcode);
            if (existing) {
                showToast('此條碼已有貨品，請編輯或使用不同條碼');
                return;
            }
            await addProduct(productData);
            loadProductList();
            resetForm();
        }
        updateStats();
    }

    // 掃描成功處理
    async function onScanSuccess(decodedText) {
        if (!isScannerRunning) return;
        
        console.log('掃描到:', decodedText);
        
        // 震動回饋
        if (navigator.vibrate) navigator.vibrate(100);
        
        const existingProduct = await getProductByBarcode(decodedText);
        
        if (existingProduct) {
            showToast(`📦 ${existingProduct.name}`);
            showProductForm(existingProduct, decodedText);
        } else {
            showToast(`🆕 新貨品，請填寫資訊`);
            showProductForm(null, decodedText);
        }
    }

    // ==================== 掃描器控制 ====================
    function startScanner() {
        if (!html5QrCodeScanner) {
            initScanner();
        } else {
            html5QrCodeScanner.resume();
            isScannerRunning = true;
            document.getElementById('startScannerBtn').style.display = 'none';
            document.getElementById('stopScannerBtn').style.display = 'inline-block';
            showToast('📷 掃描器已啟動');
        }
    }
    
    function initScanner() {
        const readerElement = document.getElementById("reader");
        if (!readerElement) return;
        
        html5QrCodeScanner = new Html5Qrcode("reader");
        const config = {
            fps: 10,
            qrbox: { width: 280, height: 280 },
            aspectRatio: 1.0
        };
        
        html5QrCodeScanner.start(
            { facingMode: "environment" },
            config,
            onScanSuccess,
            (error) => { /* 靜默處理錯誤 */ }
        ).then(() => {
            isScannerRunning = true;
            document.getElementById('startScannerBtn').style.display = 'none';
            document.getElementById('stopScannerBtn').style.display = 'inline-block';
            showToast('📷 掃描器已啟動');
        }).catch(err => {
            console.error('啟動掃描器失敗:', err);
            showToast('無法啟動掃描器，請確認已允許鏡頭權限');
            document.getElementById('startScannerBtn').style.display = 'inline-block';
            document.getElementById('stopScannerBtn').style.display = 'none';
        });
    }
    
    function stopScanner() {
        if (html5QrCodeScanner && isScannerRunning) {
            html5QrCodeScanner.stop().then(() => {
                isScannerRunning = false;
                document.getElementById('startScannerBtn').style.display = 'inline-block';
                document.getElementById('stopScannerBtn').style.display = 'none';
                showToast('掃描器已停止');
            }).catch(err => {
                console.error('停止掃描器失敗:', err);
            });
        }
    }

    // ==================== 貨品列表渲染 ====================
    async function loadProductList() {
        const searchKeyword = document.getElementById('searchInput')?.value || '';
        const products = await searchProducts(searchKeyword);
        const container = document.getElementById('productList');
        
        if (products.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <div>暫無貨品資料</div>
                    <div style="font-size: 12px; margin-top: 8px;">請先掃描條碼新增貨品</div>
                </div>
            `;
            return;
        }
        
        container.innerHTML = products.map(p => `
            <div class="product-item">
                <div class="product-info" onclick="editProductById(${p.id})">
                    <div class="product-name">${escapeHtml(p.name || '無名稱')}</div>
                    <div class="product-barcode">📷 ${escapeHtml(p.barcode || '無條碼')}</div>
                    <div class="product-meta">
                        💰 $${(p.price || 0).toLocaleString()} &nbsp;|&nbsp;
                        📦 ${p.quantity || 0} 件
                        ${p.remark ? `&nbsp;|&nbsp;📝 ${escapeHtml(p.remark.substring(0, 15))}` : ''}
                    </div>
                </div>
                <div class="product-actions">
                    <button class="icon-btn" onclick="editProductById(${p.id})" title="編輯">✏️</button>
                    <button class="icon-btn" onclick="deleteProductById(${p.id})" title="刪除">🗑️</button>
                </div>
            </div>
        `).join('');
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    window.editProductById = async function(id) {
        const product = await db.products.get(id);
        if (product) {
            switchTab('scan');
            showProductForm(product, product.barcode);
        }
    };
    
    window.deleteProductById = async function(id) {
        if (confirm('確定刪除此貨品？')) {
            await db.products.delete(id);
            showToast('已刪除');
            loadProductList();
            updateStats();
            resetForm();
        }
    };
    
    // 更新統計資訊
    async function updateStats() {
        const count = await db.products.count();
        const products = await db.products.toArray();
        const totalValue = products.reduce((sum, p) => sum + (p.price || 0) * (p.quantity || 0), 0);
        
        document.getElementById('totalCount').textContent = count;
        document.getElementById('totalValue').textContent = `$${totalValue.toLocaleString()}`;
    }
    
    // ==================== 匯出/匯入 ====================
    async function exportData() {
        const products = await getAllProducts();
        if (products.length === 0) {
            showToast('沒有資料可匯出');
            return;
        }
        
        const exportData = {
            version: "1.0",
            exportDate: new Date().toISOString(),
            totalItems: products.length,
            products: products
        };
        const jsonStr = JSON.stringify(exportData, null, 2);
        const blob = new Blob([jsonStr], { type: 'application/json' });
        saveAs(blob, `inventory_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`);
        showToast(`匯出 ${products.length} 筆資料成功`);
    }
    
    async function importData(file) {
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const data = JSON.parse(e.target.result);
                let products = data.products || (Array.isArray(data) ? data : []);
                if (products.length === 0) {
                    showToast('檔案中沒有貨品資料');
                    return;
                }
                
                const currentCount = await db.products.count();
                if (currentCount > 0 && !confirm(`目前有 ${currentCount} 筆資料，匯入將覆蓋所有資料，確定繼續？`)) {
                    return;
                }
                
                await db.products.clear();
                const cleanProducts = products.map(({ id, ...rest }) => ({
                    ...rest,
                    updatedAt: new Date().toISOString(),
                    createdAt: rest.createdAt || new Date().toISOString()
                }));
                await db.products.bulkAdd(cleanProducts);
                showToast(`成功匯入 ${cleanProducts.length} 筆資料`);
                loadProductList();
                updateStats();
                resetForm();
            } catch (err) {
                console.error('匯入失敗:', err);
                showToast('檔案格式錯誤，請確認是正確的 JSON 檔案');
            }
        };
        reader.readAsText(file);
    }
    
    // ==================== 頁籤切換 ====================
    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(content => {
            content.classList.remove('active');
        });
        document.querySelectorAll('.tab').forEach(tab => {
            tab.classList.remove('active');
        });
        
        document.getElementById(`tab-${tabId}`).classList.add('active');
        document.querySelector(`.tab[data-tab="${tabId}"]`).classList.add('active');
        
        if (tabId === 'list') {
            loadProductList();
            updateStats();
        }
        if (tabId === 'settings') {
            updateStats();
        }
    }
    
    // ==================== 事件綁定 ====================
    document.addEventListener('DOMContentLoaded', () => {
        // 頁籤切換
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const tabId = tab.getAttribute('data-tab');
                switchTab(tabId);
            });
        });
        
        // 掃描器控制
        const startBtn = document.getElementById('startScannerBtn');
        const stopBtn = document.getElementById('stopScannerBtn');
        if (startBtn) startBtn.addEventListener('click', startScanner);
        if (stopBtn) stopBtn.addEventListener('click', stopScanner);
        
        // 表單操作
        const productForm = document.getElementById('productForm');
        if (productForm) {
            productForm.addEventListener('submit', (e) => {
                e.preventDefault();
                handleSave();
            });
        }
        
        const cancelBtn = document.getElementById('cancelBtn');
        if (cancelBtn) cancelBtn.addEventListener('click', resetForm);
        
        const deleteBtn = document.getElementById('deleteBtn');
        if (deleteBtn) {
            deleteBtn.addEventListener('click', async () => {
                if (currentProduct) {
                    await deleteProduct(currentProduct.id);
                    loadProductList();
                }
            });
        }
        
        // 設定頁操作
        const exportBtn = document.getElementById('exportBtn');
        if (exportBtn) exportBtn.addEventListener('click', exportData);
        
        const importFile = document.getElementById('importFile');
        if (importFile) {
            importFile.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    importData(e.target.files[0]);
                    e.target.value = '';
                }
            });
        }
        
        const clearAllBtn = document.getElementById('clearAllBtn');
        if (clearAllBtn) clearAllBtn.addEventListener('click', clearAllData);
        
        // 搜尋
        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
            searchInput.addEventListener('input', () => {
                loadProductList();
            });
        }
        
        // 初始化統計
        updateStats();
        
        showToast('歡迎使用！點擊「啟動掃描器」開始');
    });
</script>
</body>
</html>
